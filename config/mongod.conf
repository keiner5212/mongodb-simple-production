# MongoDB 7 production (Docker). Snappy is the default compressor (best write/query speed).
#
# cacheSizeGB: mongod in Docker often sizes cache from host RAM, not mem_limit.
#   Set to ~50% of MONGO_MEMORY_LIMIT in docker-compose.yml (6g limit -> 3).
# Indexes and query shape matter more than compression for latency.

storage:
  wiredTiger:
    engineConfig:
      cacheSizeGB: 3

security:
  authorization: enabled

# Production MongoDB stack for Debian EC2.
# Copy .env.example to .env and adjust paths before first deploy.

name: mongodb-prod

services:
  mongo:
    image: mongo:8.2.9
    container_name: ${COMPOSE_PROJECT_NAME:-mongodb-prod}-mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_TLS_ENABLED: ${MONGO_TLS_ENABLED:-false}
      MONGO_TLS_MODE: ${MONGO_TLS_MODE:-requireTLS}
      MONGO_TLS_DOMAIN: ${MONGO_TLS_DOMAIN:-}
      MONGO_TLS_DIR: /etc/mongo/tls
    volumes:
      # Host bind mount: survives container recreation; easy to snapshot on EC2
      - ${MONGO_DATA_DIR}:/data/db
      - ${MONGO_CONFIG_DIR}:/data/configdb
      - ${MONGO_TLS_DIR:-/var/lib/mongodb/tls}:/etc/mongo/tls:ro
      - ./scripts/mongod-entrypoint.sh:/usr/local/bin/mongod-custom-entrypoint.sh:ro
      - ./scripts/mongo-tls-client-args.sh:/usr/local/bin/mongo-tls-client-args.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/mongod-custom-entrypoint.sh"]
    networks:
      - mongodb_internal
    ports:
      # Bind to all interfaces; secure with firewall or security group
      - "${MONGO_PORT:-27017}:27017"
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: ${MONGO_MEMORY_LIMIT:-2g}

  mongo-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-mongodb-prod}-backup:local
    container_name: ${COMPOSE_PROJECT_NAME:-mongodb-prod}-backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_TLS_ENABLED: ${MONGO_TLS_ENABLED:-false}
      MONGO_TLS_DOMAIN: ${MONGO_TLS_DOMAIN:-}
      MONGO_TLS_DIR: /etc/mongo/tls
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS}
      BACKUP_MAX_COUNT: ${BACKUP_MAX_COUNT}
      BACKUP_PATH: /backup
    volumes:
      - ${BACKUP_HOST_DIR}:/backup
      - ${MONGO_TLS_DIR:-/var/lib/mongodb/tls}:/etc/mongo/tls:ro
      - ./scripts/mongo-tls-client-args.sh:/usr/local/bin/mongo-tls-client-args.sh:ro
    depends_on:
      mongo:
        condition: service_started
    networks:
      - mongodb_internal
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 256m

networks:
  mongodb_internal:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-mongodb-prod}_internal
